<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIR | Talent Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #38bdf8; --neon-purple: #c084fc;
            --bg: #030712; --text: #f3f4f6;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); 
            color: var(--text); margin: 0; padding: 15px; min-height: 100vh;
        }
        .container { max-width: 900px; margin: auto; }
        header { text-align: center; padding: 30px 10px; }
        h1 { 
            font-size: 3rem; font-weight: 800; margin: 0; letter-spacing: -2px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .form-card { 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 30px; border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input[type="text"] { 
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); 
            color: white; padding: 14px; border-radius: 15px; font-size: 1rem; outline: none;
        }
        .grid-cats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .cat-box { background: var(--glass); border-radius: 22px; padding: 20px; border: 1px solid var(--glass-border); }
        .cat-box h3 { margin: 0 0 15px 0; font-size: 1rem; color: var(--neon-blue); border-bottom: 1px solid rgba(56, 189, 248, 0.2); padding-bottom: 5px; }
        .hab-item { 
            display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2);
            padding: 12px; border-radius: 14px; margin-bottom: 8px; font-size: 0.85rem; cursor: pointer;
        }
        .hab-item div span { display: block; font-size: 0.7rem; color: #64748b; margin-top: 2px; }
        .btn-glow { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; margin-top: 40px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: white; font-size: 1.2rem; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <header><h1>SERVIR 🚀</h1><p>Test de Habilidades y Talentos</p></header>
    <form action="https://formspree.io/f/TU_ID_AQUÍ" method="POST" class="form-card">
        <div class="input-grid">
            <div class="group"><label>Nombre y Apellidos</label><input type="text" name="Nombre" required></div>
            <div class="group"><label>N° DNI</label><input type="text" name="DNI" maxlength="8" required></div>
            <div class="group"><label>WhatsApp</label><input type="text" name="Celular" maxlength="9" required></div>
        </div>
        <p style="color:var(--neon-purple); font-weight:800; text-align:center;">Selecciona máximo 2 por categoría</p>
        <div class="grid-cats">
            <div class="cat-box"><h3>🥗 S - SALUD</h3>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="Nutrición"><div>Nutrición<span>Recetas y cocina.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="Personal Salud"><div>Salud Pro<span>Médicos y enfermeros.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="Natural"><div>Natural<span>Plantas medicinales.</span></div></label>
            </div>
            <div class="cat-box"><h3>📖 E - ENSEÑANZA</h3>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Biblia"><div>Biblia<span>Instructor bíblico.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Maestro"><div>Maestro<span>Escuela Sabática.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Pulpito"><div>Púlpito<span>Predicación.</span></div></label>
            </div>
            <div class="cat-box"><h3>🤝 R - RELACIONES</h3>
                <label class="hab-item"><input type="checkbox" name="Relaciones[]" value="Visitación"><div>Visitación<span>Hogares y enfermos.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Relaciones[]" value="Hospitalidad"><div>Hospitalidad<span>Anfitrión GP.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Relaciones[]" value="Recepción"><div>Recepción<span>Bienvenida visitas.</span></div></label>
            </div>
            <div class="cat-box"><h3>📱 V - VIRTUAL</h3>
                <label class="hab-item"><input type="checkbox" name="Virtual[]" value="Redes"><div>Redes<span>Social Media.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Virtual[]" value="Audio/Video"><div>Audio/Video<span>Producción.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Virtual[]" value="Diseño"><div>Diseño<span>Folletos y anuncios.</span></div></label>
            </div>
            <div class="cat-box"><h3>🏗️ I - INFRAESTRUCTURA</h3>
                <label class="hab-item"><input type="checkbox" name="Infra[]" value="Mantto"><div>Mantto<span>Reparaciones.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Infra[]" value="Logística"><div>Logística<span>Montaje eventos.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Infra[]" value="Decoración"><div>Decoración<span>Arreglo altar.</span></div></label>
            </div>
            <div class="cat-box"><h3>💰 R - RECURSOS</h3>
                <label class="hab-item"><input type="checkbox" name="Recursos[]" value="Música"><div>Música<span>Canto o instrumentos.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Recursos[]" value="Finanzas"><div>Finanzas<span>Contabilidad.</span></div></label>
                <label class="hab-item"><input type="checkbox" name="Recursos[]" value="Secretaría"><div>Secretaría<span>Actas y archivos.</span></div></label>
            </div>
        </div>
        <button type="submit" class="btn-glow">ENVIAR MIS DATOS ⚡</button>
    </form>
</div>
<script>
    const cats = ["Salud[]", "Enseñanza[]", "Relaciones[]", "Virtual[]", "Infra[]", "Recursos[]"];
    cats.forEach(n => {
        const cbs = document.querySelectorAll(`input[name="${n}"]`);
        cbs.forEach(cb => cb.addEventListener('change', () => {
            if(document.querySelectorAll(`input[name="${n}"]:checked`).length > 2) {
                cb.checked = false; alert("Selecciona máximo 2 por categoría");
            }
        }));
    });
</script>
</body>
</html>
