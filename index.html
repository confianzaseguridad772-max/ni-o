<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Citas CRED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --verde-fuerte: #075E54; --verde-wa: #25D366; --fondo: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--fondo); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 550px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--verde-fuerte); text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--verde-wa); padding-bottom: 10px; }
        .btn-sync { background-color: var(--verde-fuerte); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .btn-sync:hover { background-color: #05443c; }
        .lista { display: grid; gap: 15px; }
        .tarjeta { background: #fff; border: 1px solid #e0e0e0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .info b { display: block; text-transform: uppercase; color: #333; font-size: 14px; }
        .info span { font-size: 13px; color: #666; display: block; margin-top: 3px; }
        .btn-wa { background-color: var(--verde-wa); color: white; border: none; padding: 10px 18px; border-radius: 25px; text-decoration: none; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-wa:hover { transform: scale(1.05); background-color: #1ebe57; }
        .vacio { text-align: center; color: #999; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Recordatorio de Citas CRED</h2>
    <button class="btn-sync" onclick="cargarDatos()">CARGAR LISTA DE PACIENTES</button>
    <div id="lista-pacientes" class="lista">
        <p class="vacio">Presiona el botón para sincronizar con el Excel.</p>
    </div>
</div>

<script>
    // --- PEGA AQUÍ TU ENLACE QUE TERMINA EN output=csv ---
    const URL_EXCEL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-kCdER9NTPl29MALvc5Bam5N-UniBAH-OqP5GusOdT9wbJyQ5XQs-Qt66L6ds9ZxW1sUtZ9L7z4pW/pub?gid=0&single=true&output=csv';

    function cargarDatos() {
        const contenedor = document.getElementById('lista-pacientes');
        contenedor.innerHTML = '<p class="vacio">Sincronizando con Google Sheets...</p>';

        Papa.parse(URL_EXCEL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(resultado) {
                mostrarPacientes(resultado.data);
            },
            error: function() {
                contenedor.innerHTML = '<p class="vacio" style="color:red;">Error de conexión. Verifica que el Excel esté publicado como CSV.</p>';
            }
        });
    }

    function mostrarPacientes(datos) {
        const contenedor = document.getElementById('lista-pacientes');
        contenedor.innerHTML = '';

        if (datos.length === 0) {
            contenedor.innerHTML = '<p class="vacio">No hay datos en el Excel.</p>';
            return;
        }

        datos.forEach(p => {
            // Usamos los nombres exactos de tus columnas
            const nombre = p['NOMBRE'] ? p['NOMBRE'].trim() : 'PACIENTE';
            const celular = p['CELULAR'] ? p['CELULAR'].trim() : '';
            const fechaCita = p['FECHA DE CITA'] ? p['FECHA DE CITA'].trim() : '---';

            if (celular === "") return; // Ignorar filas sin teléfono

            const item = document.createElement('div');
            item.className = 'tarjeta';
            
            // EL MENSAJE QUE SOLICITASTE
            const saludo = "Hola, le saludamos de su centro de salud.";
            const mensaje = `${saludo} *${nombre}*, se le recuerda que la cita de su control de su bebe será el *${fechaCita}*. Por favor, no falte.`;
            
            // Link de WhatsApp (Prefijo 51 para Perú)
            const linkWA = `https://api.whatsapp.com/send?phone=51${celular}&text=${encodeURIComponent(mensaje)}`;

            item.innerHTML = `
                <div class="info">
                    <b>${nombre}</b>
                    <span>📅 Cita: ${fechaCita}</span>
                    <span>📱 Cel: ${celular}</span>
                </div>
                <a href="${linkWA}" target="_blank" class="btn-wa">ENVIAR WA</a>
            `;
            contenedor.appendChild(item);
        });
    }
</script>

</body>
</html>
