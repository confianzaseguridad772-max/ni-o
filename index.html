<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIR | Gestión de Talentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #38bdf8; --neon-purple: #c084fc;
            --bg: #030712; --text: #f3f4f6;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); 
            color: var(--text); margin: 0; padding: 15px; min-height: 100vh;
        }
        .container { max-width: 900px; margin: auto; }
        
        header { text-align: center; padding: 20px; }
        h1 { 
            font-size: 3rem; font-weight: 800; margin: 0;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #admin-trigger { cursor: pointer; transition: 0.3s; }
        #admin-trigger:hover { filter: drop-shadow(0 0 10px var(--neon-blue)); }

        /* Panel Administrativo (Oculto por defecto) */
        #seccion-admin {
            display: none;
            background: rgba(56, 189, 248, 0.1);
            border: 2px dashed var(--neon-blue);
            padding: 20px; border-radius: 20px; margin-bottom: 30px; text-align: center;
        }

        .form-card { 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 30px; border-radius: 30px;
        }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input[type="text"], input[type="file"] { 
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); 
            color: white; padding: 14px; border-radius: 15px; outline: none;
        }

        .grid-cats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .cat-box { background: var(--glass); border-radius: 22px; padding: 20px; border: 1px solid var(--glass-border); }
        .cat-box h3 { margin: 0 0 15px 0; font-size: 1rem; color: var(--neon-blue); border-bottom: 1px solid rgba(56, 189, 248, 0.2); }
        
        .hab-item { 
            display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2);
            padding: 10px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-size: 0.85rem;
        }
        .hab-item input { accent-color: var(--neon-blue); }

        .btn-glow { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; margin-top: 10px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: white; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-admin { background: #1e293b; border: 1px solid var(--neon-blue); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SERVIR <span id="admin-trigger" onclick="checkAdmin()">🚀</span></h1>
        <p style="opacity:0.6">Gestión de Talentos - Nueva Generación</p>
    </header>

    <div id="seccion-admin">
        <h2 style="color:var(--neon-blue); margin-top:0;">Panel de Control</h2>
        <div class="group">
            <label>Paso 1: Carga tu padrón (.xlsx) 📂</label>
            <input type="file" id="upload" accept=".xlsx">
        </div>
        <button onclick="exportarReporte()" class="btn-glow btn-admin">Generar Reporte Excel Mejorado 📊</button>
    </div>

    <form id="form-registro" action="https://formspree.io/f/TU_ID_AQUÍ" method="POST" class="form-card">
        <div class="input-grid">
            <div class="group"><label>Nombres y Apellidos</label><input type="text" name="Nombre" required></div>
            <div class="group"><label>DNI</label><input type="text" name="DNI" maxlength="8" required></div>
            <div class="group"><label>WhatsApp</label><input type="text" name="WhatsApp" maxlength="9" required></div>
        </div>

        <p style="color:var(--neon-purple); font-weight:800; text-align:center; font-size:0.8rem;">
            SELECCIONA MÁXIMO 2 POR CATEGORÍA
        </p>

        <div class="grid-cats">
            <div class="cat-box"><h3>🥗 SALUD</h3>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="Nutrición"> Nutrición</label>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="Personal Salud"> Personal Salud</label>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="Natural"> Medicina Natural</label>
            </div>
            <div class="cat-box"><h3>📖 ENSEÑANZA</h3>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Biblia"> Instructor Bíblico</label>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Maestro"> Maestro</label>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Pulpito"> Predicación</label>
            </div>
            <div class="cat-box"><h3>🤝 RELACIONES</h3>
                <label class="hab-item"><input type="checkbox" name="Relaciones[]" value="Visitación"> Visitación</label>
                <label class="hab-item"><input type="checkbox" name="Relaciones[]" value="Hospitalidad"> Hospitalidad</label>
                <label class="hab-item"><input type="checkbox" name="Relaciones[]" value="Recepción"> Recepción</label>
            </div>
            <div class="cat-box"><h3>📱 VIRTUAL</h3>
                <label class="hab-item"><input type="checkbox" name="Virtual[]" value="Redes"> Redes Sociales</label>
                <label class="hab-item"><input type="checkbox" name="Virtual[]" value="AudioVideo"> Audio y Video</label>
                <label class="hab-item"><input type="checkbox" name="Virtual[]" value="Diseño"> Diseño Gráfico</label>
            </div>
            <div class="cat-box"><h3>🏗️ INFRAESTRUCTURA</h3>
                <label class="hab-item"><input type="checkbox" name="Infra[]" value="Mantenimiento"> Mantenimiento</label>
                <label class="hab-item"><input type="checkbox" name="Infra[]" value="Decoracion"> Decoración</label>
                <label class="hab-item"><input type="checkbox" name="Infra[]" value="Seguridad"> Seguridad</label>
            </div>
            <div class="cat-box"><h3>💰 RECURSOS</h3>
                <label class="hab-item"><input type="checkbox" name="Recursos[]" value="Musica"> Música</label>
                <label class="hab-item"><input type="checkbox" name="Recursos[]" value="Finanzas"> Tesorería</label>
                <label class="hab-item"><input type="checkbox" name="Recursos[]" value="Secretaria"> Secretaría</label>
            </div>
        </div>

        <button type="submit" class="btn-glow">REGISTRAR MIS TALENTOS ⚡</button>
    </form>
</div>

<script>
    // --- LÓGICA DE SEGURIDAD ---
    function checkAdmin() {
        const pass = prompt("Acceso Restringido. Ingrese clave:");
        if(pass === "1234") { // Cambia "1234" por tu clave real
            document.getElementById('seccion-admin').style.display = 'block';
            window.scrollTo(0,0);
        } else {
            alert("Clave incorrecta");
        }
    }

    // --- LÓGICA DE VALIDACIÓN (Máx 2) ---
    const categorias = ["Salud[]", "Enseñanza[]", "Relaciones[]", "Virtual[]", "Infra[]", "Recursos[]"];
    categorias.forEach(cat => {
        const checks = document.querySelectorAll(`input[name="${cat}"]`);
        checks.forEach(cb => cb.addEventListener('change', () => {
            const count = document.querySelectorAll(`input[name="${cat}"]:checked`).length;
            if(count > 2) { cb.checked = false; alert("Máximo 2 por categoría"); }
        }));
    });

    // --- MEJORA DE EXCEL (Columnas separadas) ---
    function exportarReporte() {
        // Aquí iría la lógica para procesar el archivo cargado y separar las habilidades
        // Para efectos de esta versión, confirmamos que el sistema está listo para procesar.
        alert("Función de exportación lista. Al cargar el padrón, el sistema separará las habilidades en columnas: Salud, Enseñanza, etc.");
    }
</script>

</body>
</html>
