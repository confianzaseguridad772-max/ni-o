<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIR App | Talent Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #38bdf8; --neon-purple: #c084fc; --neon-pink: #f472b6;
            --success: #2dd4bf; --bg: #030712; --text: #f3f4f6;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); 
            color: var(--text); margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 1100px; margin: auto; }

        /* HEADER JUVENIL */
        header { 
            text-align: center; padding: 40px 20px; border-radius: 30px; 
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(192, 132, 252, 0.1));
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border); margin-bottom: 30px;
        }
        h1 { font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -2px; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-tag { font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; color: var(--neon-blue); font-weight: 600; }

        /* PANEL DE CARGA */
        .step-box { 
            background: var(--glass); border: 1px dashed var(--glass-border); 
            border-radius: 20px; padding: 20px; margin-bottom: 30px; text-align: center;
        }

        /* FORMULARIO ESTILO TARJETA FLOTANTE */
        .form-card { 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
            padding: 35px; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); margin-bottom: 30px;
        }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; padding-left: 5px; }
        input, select { 
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); 
            color: white; padding: 12px 16px; border-radius: 14px; font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        input:disabled { opacity: 0.4; cursor: not-allowed; }

        /* BADGE DE EDAD */
        #resultadoEdad { 
            grid-column: 1 / -1; margin-top: 15px; padding: 15px; border-radius: 16px; 
            background: linear-gradient(to right, rgba(56,189,248,0.1), transparent);
            border-left: 4px solid var(--neon-blue); font-weight: 600;
        }

        /* CATEGORÍAS */
        .grid-cats { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .cat-card { 
            background: var(--glass); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }
        .cat-card:hover { transform: translateY(-5px); border-color: var(--neon-purple); }
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cat-header h3 { margin: 0; font-size: 1rem; color: var(--neon-blue); }

        .hab-btn { 
            display: flex; align-items: flex-start; gap: 12px; background: rgba(0,0,0,0.2);
            padding: 12px; border-radius: 16px; margin-bottom: 8px; cursor: pointer;
            border: 1px solid transparent; transition: 0.2s;
        }
        .hab-btn:has(input:checked) { border-color: var(--success); background: rgba(45, 212, 191, 0.05); }
        .hab-btn span { font-size: 0.8rem; color: #94a3b8; display: block; line-height: 1.2; margin-top: 3px; }

        .btn-glow { 
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: white; font-size: 1.2rem; font-weight: 800; cursor: pointer;
            transition: 0.4s; box-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
        }
        .btn-glow:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(192, 132, 252, 0.5); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="sub-tag">System Intelligence</div>
        <h1>SERVIR 🚀</h1>
        <p style="opacity: 0.7;">Gestionando el talento de la nueva generación</p>
    </header>

    <div class="step-box">
        <label style="display:block; margin-bottom:10px;">Paso 1: Carga tu padrón (.xlsx) 📂</label>
        <input type="file" id="subirExcel" accept=".xlsx, .xls">
        <button onclick="exportarExcel()" style="margin-left:10px; padding: 8px 15px; border-radius: 10px; background: var(--success); border:none; color:black; font-weight:700; cursor:pointer;">Exportar Reporte</button>
    </div>

    <form id="registroForm">
        <div class="form-card">
            <div class="input-grid">
                <div class="group"><label>DNI</label><input type="text" id="dni" maxlength="8" oninput="buscarSujeto(this.value)" placeholder="Ej. 7060..." required></div>
                <div class="group"><label>Nombres</label><input type="text" id="nombres" required disabled></div>
                <div class="group"><label>Ap. Paterno</label><input type="text" id="apePaterno" required disabled></div>
                <div class="group"><label>Ap. Materno</label><input type="text" id="apeMaterno" required disabled></div>
                <div class="group"><label>Sexo</label><select id="sexo" required disabled><option value="">-</option><option value="M">M</option><option value="F">F</option></select></div>
                <div class="group"><label>Nacimiento</label><input type="date" id="fechaNac" onchange="actualizarEdadUI()" required disabled></div>
                <div class="group"><label>WhatsApp 📱</label><input type="text" id="celular" maxlength="9" class="editable" required disabled></div>
                <div class="group" style="grid-column: span 1;"><label>Dirección 📍</label><input type="text" id="direccion" class="editable" required disabled></div>
            </div>
            <div id="resultadoEdad">✨ Esperando identificación...</div>
        </div>

        <div class="grid-cats">
            <div class="cat-card">
                <div class="cat-header"><h3>🥗 S - SALUD</h3><div style="font-size:0.7rem; color:var(--success)" id="txt-Salud">0%</div></div>
                <label class="hab-btn"><input type="checkbox" name="h-Salud" value="Nutrición"><div>Nutrición<span>Talleres de cocina sana.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Salud" value="Personal Salud"><div>Salud Pro<span>Médicos y enfermería.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Salud" value="Natural"><div>Natural<span>Uso de plantas.</span></div></label>
            </div>

            <div class="cat-card">
                <div class="cat-header"><h3>📖 E - ENSEÑANZA</h3><div style="font-size:0.7rem; color:var(--success)" id="txt-Enseñanza">0%</div></div>
                <label class="hab-btn"><input type="checkbox" name="h-Enseñanza" value="Biblia"><div>Biblia<span>Instructor bíblico.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Enseñanza" value="Maestro"><div>Maestro<span>Escuela Sabática.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Enseñanza" value="Pulpito"><div>Púlpito<span>Predicación.</span></div></label>
            </div>

            <div class="cat-card">
                <div class="cat-header"><h3>🤝 R - RELACIONES</h3><div style="font-size:0.7rem; color:var(--success)" id="txt-Relaciones">0%</div></div>
                <label class="hab-btn"><input type="checkbox" name="h-Relaciones" value="Visitacion"><div>Visitación<span>Hogares y enfermos.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Relaciones" value="Hospitalidad"><div>Hospitalidad<span>Anfitrión GP.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Relaciones" value="Recepcion"><div>Recepción<span>Atención a visitas.</span></div></label>
            </div>

            <div class="cat-card">
                <div class="cat-header"><h3>📱 V - VIRTUAL</h3><div style="font-size:0.7rem; color:var(--success)" id="txt-Virtual">0%</div></div>
                <label class="hab-btn"><input type="checkbox" name="h-Virtual" value="Redes"><div>Redes<span>Social Media.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Virtual" value="Audio/Video"><div>Producción<span>Sonido y video.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Virtual" value="Diseño"><div>Diseño<span>Gráfica y anuncios.</span></div></label>
            </div>

            <div class="cat-card">
                <div class="cat-header"><h3>🏗️ I - INFRA</h3><div style="font-size:0.7rem; color:var(--success)" id="txt-Infraestructura">0%</div></div>
                <label class="hab-btn"><input type="checkbox" name="h-Infraestructura" value="Mantenimiento"><div>Mantto.<span>Reparaciones.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Infraestructura" value="Logistica"><div>Logística<span>Coordinación.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Infraestructura" value="Decoracion"><div>Decoración<span>Estética eventos.</span></div></label>
            </div>

            <div class="cat-card">
                <div class="cat-header"><h3>💰 R - ADMIN</h3><div style="font-size:0.7rem; color:var(--success)" id="txt-Administracion">0%</div></div>
                <label class="hab-btn"><input type="checkbox" name="h-Administracion" value="Música"><div>Música<span>Vocal e instrumental.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Administracion" value="Finanzas"><div>Finanzas<span>Presupuestos.</span></div></label>
                <label class="hab-btn"><input type="checkbox" name="h-Administracion" value="Secretaría"><div>Secretaría<span>Actas y archivos.</span></div></label>
            </div>
        </div>

        <button type="submit" class="btn-glow">GUARDAR REGRESO ⚡</button>
    </form>
</div>

<script>
    let db = [];
    let esNuevo = false;
    const CATEGORIAS = ["Salud", "Enseñanza", "Relaciones", "Virtual", "Infraestructura", "Administracion"];

    window.onload = () => {
        const data = localStorage.getItem('SERVIR_V10');
        if (data) db = JSON.parse(data);
        aplicarRegla2();
        actualizarStats();
    };

    function aplicarRegla2() {
        CATEGORIAS.forEach(cat => {
            const cbs = document.querySelectorAll(`input[name="h-${cat}"]`);
            cbs.forEach(cb => cb.addEventListener('change', () => {
                if(document.querySelectorAll(`input[name="h-${cat}"]:checked`).length > 2) {
                    cb.checked = false;
                    alert("¡Hey! Solo puedes elegir 2 por categoría.");
                }
            }));
        });
    }

    function buscarSujeto(dni) {
        if(dni.length !== 8) return;
        const p = db.find(x => String(x.DNI) === dni);
        const fFijos = ['nombres', 'apePaterno', 'apeMaterno', 'sexo', 'fechaNac'];
        const fEdit = ['celular', 'direccion'];
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);

        if(p) {
            esNuevo = false;
            fFijos.forEach(id => document.getElementById(id).disabled = true);
            fEdit.forEach(id => document.getElementById(id).disabled = false);
            const n = p["Nombres y Apellidos"].split(" ");
            document.getElementById('apeMaterno').value = n.pop();
            document.getElementById('apePaterno').value = n.pop();
            document.getElementById('nombres').value = n.join(" ");
            document.getElementById('fechaNac').value = p["Fecha Nacimiento"];
            document.getElementById('sexo').value = p.Sexo;
            document.getElementById('celular').value = p.Celular;
            document.getElementById('direccion').value = p.Dirección;
            CATEGORIAS.forEach(cat => {
                if(p[cat]) p[cat].split(" | ").forEach(v => {
                    const check = document.querySelector(`input[name="h-${cat}"][value="${v}"]`);
                    if(check) check.checked = true;
                });
            });
            actualizarEdadUI();
        } else {
            esNuevo = true;
            [...fFijos, ...fEdit].forEach(id => { document.getElementById(id).disabled = false; document.getElementById(id).value = ""; });
            document.getElementById('resultadoEdad').innerText = "🚀 ¡Nuevo Talento Detectado!";
        }
    }

    function actualizarEdadUI() {
        const f = document.getElementById('fechaNac').value;
        if(!f) return;
        const a = new Date().getFullYear() - new Date(f).getFullYear();
        document.getElementById('resultadoEdad').innerText = `⚡ ${a} años - Ready para servir.`;
    }

    document.getElementById('registroForm').onsubmit = (e) => {
        e.preventDefault();
        const dni = document.getElementById('dni').value;
        const nom = `${document.getElementById('nombres').value} ${document.getElementById('apePaterno').value} ${document.getElementById('apeMaterno').value}`.toUpperCase();
        const reg = { DNI: dni, "Nombres y Apellidos": nom, "Fecha Nacimiento": document.getElementById('fechaNac').value, Sexo: document.getElementById('sexo').value, Celular: document.getElementById('celular').value, Dirección: document.getElementById('direccion').value };
        CATEGORIAS.forEach(cat => {
            const sel = Array.from(document.querySelectorAll(`input[name="h-${cat}"]:checked`)).map(c => c.value);
            reg[cat] = sel.join(" | ");
        });
        if(esNuevo) db.push(reg); else db[db.findIndex(x => String(x.DNI) === dni)] = reg;
        localStorage.setItem('SERVIR_V10', JSON.stringify(db));
        location.reload();
    };

    function exportarExcel() {
        const ws = XLSX.utils.json_to_sheet(db);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Talentos");
        XLSX.writeFile(wb, "SERVIR_6_Columns.xlsx");
    }

    document.getElementById('subirExcel').addEventListener('change', (e) => {
        const fr = new FileReader();
        fr.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type:'binary', cellDates: true});
            db = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            localStorage.setItem('SERVIR_V10', JSON.stringify(db));
            location.reload();
        };
        fr.readAsBinaryString(e.target.files[0]);
    });

    function actualizarStats() {
        CATEGORIAS.forEach(cat => {
            const c = db.filter(p => p[cat] && p[cat] !== "").length;
            const p = db.length > 0 ? ((c / db.length) * 100).toFixed(0) : 0;
            document.getElementById(`txt-${cat}`).innerText = p + "%";
        });
    }
</script>
</body>
</html>
