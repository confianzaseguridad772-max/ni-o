<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Controles - CRED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primario: #075E54; --whatsapp: #25D366; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--gris); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .contenedor { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primario); text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--whatsapp); padding-bottom: 10px; }
        .btn-cargar { background-color: var(--primario); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .btn-cargar:hover { background-color: #05443c; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .tarjeta { border: 1px solid #eee; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; background: #fff; margin-bottom: 10px; transition: 0.2s; }
        .tarjeta:hover { border-color: var(--whatsapp); }
        .paciente-info b { display: block; text-transform: uppercase; font-size: 14px; color: #333; }
        .paciente-info span { font-size: 13px; color: #666; display: block; margin-top: 4px; }
        .btn-enviar { background-color: var(--whatsapp); color: white; border: none; padding: 10px 15px; border-radius: 20px; text-decoration: none; font-size: 12px; font-weight: bold; text-align: center; }
        .btn-enviar:hover { transform: scale(1.05); }
        .footer-info { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Recordatorio de Control CRED</h2>
    
    <button class="btn-cargar" onclick="sincronizarExcel()">CARGAR PACIENTES DEL EXCEL</button>

    <div id="lista-pacientes">
        <p style="text-align: center; color: #999;">Haz clic arriba para ver la lista de pacientes.</p>
    </div>

    <div class="footer-info">Conectado a Google Sheets en tiempo real</div>
</div>

<script>
    // --- IMPORTANTE: PEGA AQUÍ TU ENLACE CSV ---
    const MI_URL_EXCEL = 'https://script.google.com/macros/s/AKfycbx2U9XYOX7pUe2wF2-fp_RzXPCgQjWvH_xijVVckq7vDMf4hoYb0A4ChZqV5lHh9zyc/exec';

    function sincronizarExcel() {
        const divLista = document.getElementById('lista-pacientes');
        divLista.innerHTML = '<p style="text-align: center;">Accediendo a la base de datos de Google...</p>';

        Papa.parse(MI_URL_EXCEL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(docs) {
                mostrarEnPantalla(docs.data);
            },
            error: function() {
                divLista.innerHTML = '<p style="text-align: center; color: red;">Error: Revisa que el Excel esté "Publicado en la web" como CSV.</p>';
            }
        });
    }

    function mostrarEnPantalla(pacientes) {
        const divLista = document.getElementById('lista-pacientes');
        divLista.innerHTML = '';

        pacientes.forEach(p => {
            // Extraemos datos según tus columnas exactas
            const nombre = p['NOMBRE'] ? p['NOMBRE'].trim() : 'Sin Nombre';
            const celular = p['CELULAR'] ? p['CELULAR'].trim() : '';
            const fechaCita = p['FECHA DE CITA'] ? p['FECHA DE CITA'].trim() : '---';

            const item = document.createElement('div');
            item.className = 'tarjeta';
            
            // EL MENSAJE QUE SOLICITASTE
            const texto = `Hola, le saludamos de su centro de salud. *${nombre}*, se le recuerda que la cita de su control de su bebe será el *${fechaCita}*. Por favor, no falte.`;
            
            // Link de WhatsApp (Prefijo 51 para Perú)
            const waLink = `https://api.whatsapp.com/send?phone=51${celular}&text=${encodeURIComponent(texto)}`;

            item.innerHTML = `
                <div class="paciente-info">
                    <b>${nombre}</b>
                    <span>📅 Cita: ${fechaCita}</span>
                    <span>📱 Cel: ${celular}</span>
                </div>
                <a href="${waLink}" target="_blank" class="btn-enviar">ENVIAR RECORDATORIO</a>
            `;
            divLista.appendChild(item);
        });
    }
</script>

</body>
</html>
