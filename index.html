<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIR | Talent Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        #seccion-admin { display: none !important; } 
        :root { --neon-blue: #38bdf8; --neon-purple: #c084fc; --bg: #030712; --text: #f3f4f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; }
        .container { max-width: 1200px; margin: auto; }
        header { text-align: center; padding: 30px 10px; }
        h1 { font-size: 3.5rem; font-weight: 800; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .cohete { cursor: pointer; display: inline-block; transition: 0.4s; }
        .cohete:hover { transform: scale(1.2) rotate(-15deg); filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .admin-box { background: rgba(56, 189, 248, 0.08); border: 2px dashed var(--neon-blue); padding: 30px; border-radius: 30px; margin-bottom: 40px; text-align: center; }
        .form-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 15px; border-radius: 15px; outline: none; }
        input:read-only { background: rgba(255, 255, 255, 0.05); color: var(--neon-blue); cursor: not-allowed; }
        .grid-cats { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .cat-box { background: rgba(255,255,255,0.02); border-radius: 25px; padding: 22px; border: 1px solid rgba(255,255,255,0.05); }
        .cat-box h3 { color: var(--neon-blue); font-size: 1rem; margin-bottom: 18px; border-bottom: 1px solid rgba(56,189,248,0.2); padding-bottom: 8px; }
        .hab-item { display: flex; align-items: flex-start; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px 15px; border-radius: 14px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; gap: 10px; }
        .hab-item:hover { background: rgba(56, 189, 248, 0.1); }
        .hab-text { display: flex; flex-direction: column; }
        .hab-text span { font-size: 0.7rem; color: #64748b; line-height: 1.2; }
        .btn { width: 100%; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 25px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SERVIR <span class="cohete" onclick="toggleAdmin()">🚀</span></h1>
        <p style="opacity: 0.6; margin-top: 10px;">Gestión de Talentos y Habilidades</p>
    </header>

    <div id="seccion-admin" class="admin-box">
        <h2 style="color:var(--neon-blue); margin-bottom:15px;">🔐 Cargar Padrón (.xlsx)</h2>
        <input type="file" id="inputExcel" accept=".xlsx">
    </div>

    <form class="form-card" id="formRegistro">
        <div class="input-grid">
            <div class="group"><label>DNI</label><input type="text" id="dni" maxlength="8" required></div>
            <div class="group"><label>Edad</label><input type="text" id="edad" readonly></div>
            <div class="group"><label>Sexo</label><input type="text" id="sexo" readonly></div>
            <div class="group"><label>Celular</label><input type="text" id="celular" maxlength="9" required></div>
        </div>
        <div class="group" style="margin-bottom: 15px;"><label>Nombre Completo</label><input type="text" id="nombres" required></div>
        <div class="group" style="margin-bottom: 30px;"><label>Dirección</label><input type="text" id="direccion" required></div>

        <div class="grid-cats">
            <div class="cat-box"><h3>🥗 S - SALUD</h3>
                <label class="hab-item"><div class="hab-text">Nutrición <span>Recetas saludables y talleres.</span></div><input type="checkbox" name="Salud[]" value="Nutricion"></label>
                <label class="hab-item"><div class="hab-text">Personal Salud <span>Atención sanitaria.</span></div><input type="checkbox" name="Salud[]" value="Salud"></label>
                <label class="hab-item"><div class="hab-text">Natural <span>Uso de plantas medicinales.</span></div><input type="checkbox" name="Salud[]" value="Natural"></label>
                <label class="hab-item"><div class="hab-text">Prevención <span>Charlas sobre adicciones.</span></div><input type="checkbox" name="Salud[]" value="Prevencion"></label>
                <label class="hab-item"><div class="hab-text">Bienestar <span>Ejercicios y pausas activas.</span></div><input type="checkbox" name="Salud[]" value="Bienestar"></label>
                <label class="hab-item"><div class="hab-text">Apoyo Sanitario <span>Logística y orden en ferias.</span></div><input type="checkbox" name="Salud[]" value="Apoyo"></label>
            </div>

            <div class="cat-box"><h3>📖 E - ENSEÑANZA</h3>
                <label class="hab-item"><div class="hab-text">Biblia <span>Instructor de estudios bíblicos.</span></div><input type="checkbox" name="Ensenanza[]" value="Biblia"></label>
                <label class="hab-item"><div class="hab-text">Maestro <span>Menores y Escuela Sabática.</span></div><input type="checkbox" name="Ensenanza[]" value="Maestro"></label>
                <label class="hab-item"><div class="hab-text">Púlpito <span>Predicación y dirección de cultos.</span></div><input type="checkbox" name="Ensenanza[]" value="Pulpito"></label>
                <label class="hab-item"><div class="hab-text">Capacitación <span>Discipulado y misión.</span></div><input type="checkbox" name="Ensenanza[]" value="Capacitacion"></label>
                <label class="hab-item"><div class="hab-text">Profecía <span>Daniel y Apocalipsis.</span></div><input type="checkbox" name="Ensenanza[]" value="Profecia"></label>
                <label class="hab-item"><div class="hab-text">Mentoría <span>Consejería espiritual jóvenes.</span></div><input type="checkbox" name="Ensenanza[]" value="Mentoria"></label>
            </div>

            <div class="cat-box"><h3>🤝 R - RELACIONES</h3>
                <label class="hab-item"><div class="hab-text">Visitación <span>Hogares de hermanos enfermos.</span></div><input type="checkbox" name="Relaciones[]" value="Visitacion"></label>
                <label class="hab-item"><div class="hab-text">Hospitalidad <span>Anfitrión de Grupos Pequeños.</span></div><input type="checkbox" name="Relaciones[]" value="Hospitalidad"></label>
                <label class="hab-item"><div class="hab-text">Intercesión <span>Red de oración intercesora.</span></div><input type="checkbox" name="Relaciones[]" value="Intercesion"></label>
                <label class="hab-item"><div class="hab-text">Recepción <span>Bienvenida y atención a visitas.</span></div><input type="checkbox" name="Relaciones[]" value="Recepcion"></label>
                <label class="hab-item"><div class="hab-text">Vínculo Público <span>Relación con autoridades.</span></div><input type="checkbox" name="Relaciones[]" value="Vinculo"></label>
                <label class="hab-item"><div class="hab-text">Idiomas <span>Traducción (inglés, quechua, etc.).</span></div><input type="checkbox" name="Relaciones[]" value="Idiomas"></label>
            </div>

            <div class="cat-box"><h3>📱 V - VIRTUAL / COMUNICACIÓN</h3>
                <label class="hab-item"><div class="hab-text">Redes <span>Gestión de FB, IG o WhatsApp.</span></div><input type="checkbox" name="Virtual[]" value="Redes"></label>
                <label class="hab-item"><div class="hab-text">Audio/Video <span>Consolas, micros o edición.</span></div><input type="checkbox" name="Virtual[]" value="AudioVideo"></label>
                <label class="hab-item"><div class="hab-text">Diseño <span>Folletos y anuncios digitales.</span></div><input type="checkbox" name="Virtual[]" value="Diseno"></label>
                <label class="hab-item"><div class="hab-text">Sistemas <span>Excel, bases de datos, web.</span></div><input type="checkbox" name="Virtual[]" value="Sistemas"></label>
                <label class="hab-item"><div class="hab-text">Fotografía <span>Documentación de eventos.</span></div><input type="checkbox" name="Virtual[]" value="Fotografia"></label>
                <label class="hab-item"><div class="hab-text">Redacción <span>Escritura de noticias y artículos.</span></div><input type="checkbox" name="Virtual[]" value="Redaccion"></label>
            </div>

            <div class="cat-box"><h3>🏗️ I - INFRAESTRUCTURA</h3>
                <label class="hab-item"><div class="hab-text">Mantenimiento <span>Electricidad, carpintería, pintura.</span></div><input type="checkbox" name="Infra[]" value="Mantto"></label>
                <label class="hab-item"><div class="hab-text">Logística <span>Montaje y coordinación eventos.</span></div><input type="checkbox" name="Infra[]" value="Logistica"></label>
                <label class="hab-item"><div class="hab-text">Limpieza <span>Cuidado y aseo del templo.</span></div><input type="checkbox" name="Infra[]" value="Limpieza"></label>
                <label class="hab-item"><div class="hab-text">Decoración <span>Altar y eventos especiales.</span></div><input type="checkbox" name="Infra[]" value="Decoracion"></label>
                <label class="hab-item"><div class="hab-text">Seguridad <span>Vigilancia de instalaciones.</span></div><input type="checkbox" name="Infra[]" value="Seguridad"></label>
                <label class="hab-item"><div class="hab-text">Transporte <span>Conductor traslados misioneros.</span></div><input type="checkbox" name="Infra[]" value="Transporte"></label>
            </div>

            <div class="cat-box"><h3>💰 R - RECURSOS / ADMINISTRACIÓN</h3>
                <label class="hab-item"><div class="hab-text">Música Vocal <span>Canto solo o coral.</span></div><input type="checkbox" name="Recursos[]" value="MusicaVocal"></label>
                <label class="hab-item"><div class="hab-text">Instrumental <span>Piano, guitarra, etc.</span></div><input type="checkbox" name="Recursos[]" value="Instrumental"></label>
                <label class="hab-item"><div class="hab-text">Finanzas <span>Contabilidad y tesorería.</span></div><input type="checkbox" name="Recursos[]" value="Finanzas"></label>
                <label class="hab-item"><div class="hab-text">Manualidades <span>Tejido o arte para talleres.</span></div><input type="checkbox" name="Recursos[]" value="Manualidades"></label>
                <label class="hab-item"><div class="hab-text">Secretaría <span>Actas, cartas y archivos.</span></div><input type="checkbox" name="Recursos[]" value="Secretaria"></label>
                <label class="hab-item"><div class="hab-text">Filantropía <span>Gestión de donaciones.</span></div><input type="checkbox" name="Recursos[]" value="Filantropia"></label>
            </div>
        </div>
        
        <button type="submit" class="btn">FINALIZAR REGISTRO ⚡</button>
    </form>
</div>

<script>
    let padronData = [];
    document.getElementById('inputExcel').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            padronData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            document.getElementById('seccion-admin').style.setProperty('display', 'none', 'important');
            alert("✅ Padrón cargado.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    document.getElementById('dni').addEventListener('input', function() {
        if(this.value.length === 8) {
            const p = padronData.find(r => String(r.DNI).trim() === this.value.trim());
            if(p) {
                document.getElementById('nombres').value = p["Nombres y Apellidos"] || "";
                document.getElementById('direccion').value = p["Dirección"] || "";
                document.getElementById('celular').value = p.Celular || "";
                document.getElementById('sexo').value = (p.Sexo === "M") ? "MASCULINO" : (p.Sexo === "F" ? "FEMENINO" : p.Sexo);
                if(p["Fecha Nacimiento"]) {
                    const fecha = !isNaN(p["Fecha Nacimiento"]) ? new Date((p["Fecha Nacimiento"] - 25569) * 86400 * 1000) : new Date(p["Fecha Nacimiento"]);
                    document.getElementById('edad').value = new Date().getFullYear() - fecha.getFullYear();
                }
            }
        }
    });

    function toggleAdmin() { if(prompt("Contraseña:") === "admin2026") { document.getElementById('seccion-admin').style.setProperty('display', 'block', 'important'); } }

    const cats = ["Salud[]", "Ensenanza[]", "Relaciones[]", "Virtual[]", "Infra[]", "Recursos[]"];
    cats.forEach(cName => {
        document.querySelectorAll(`input[name="${cName}"]`).forEach(box => {
            box.addEventListener('change', () => {
                if(document.querySelectorAll(`input[name="${cName}"]:checked`).length > 2) {
                    box.checked = false; alert("Selecciona máximo 2 opciones por categoría.");
                }
            });
        });
    });
</script>
</body>
</html>
