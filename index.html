<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión CRED - Filtro por Turno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --dark: #075E54; --wa: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--dark); text-align: center; margin-bottom: 20px; }
        .filtros { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .filtros label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        .filtros input, .filtros select { padding: 10px; margin-top: 5px; width: 100%; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-main { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-next { background: #ff9800; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: none; text-align: center; text-decoration: none; }
        .tarjeta { border: 1px solid #eee; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .info b { display: block; text-transform: uppercase; font-size: 13px; color: #333; }
        .info span { font-size: 11px; color: #666; display: block; }
        .hoy-badge { background: #d32f2f; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-top: 4px; display: inline-block; }
        .btn-send { background: var(--wa); color: white; text-decoration: none; padding: 8px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Control CRED - Filtro Avanzado</h2>
    
    <div class="filtros">
        <label>DESDE:</label>
        <input type="date" id="fechaInicio">
        
        <label>HASTA:</label>
        <input type="date" id="fechaFin">
        
        <label>FILTRAR POR TURNO:</label>
        <select id="filtroTurno">
            <option value="TODOS">-- TODOS LOS TURNOS --</option>
            <option value="Mañana">MAÑANA</option>
            <option value="Tarde">TARDE</option>
        </select>

        <button class="btn-main" onclick="cargarExcel()">FILTRAR Y CARGAR PACIENTES</button>
    </div>
    
    <a id="btnSiguiente" href="#" target="_blank" class="btn-next" onclick="marcarSiguiente()">ENVIAR AL SIGUIENTE PACIENTE</a>

    <div id="lista"></div>
</div>

<script>
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-kCdER9NTPl29MALvc5Bam5N-UniBAH-OqP5GusOdT9wbJyQ5XQs-Qt66L6ds9ZxW1sUtZ9L7z4pW/pub?gid=0&single=true&output=csv'; // <--- PEGA TU LINK CSV AQUÍ
    let pacientesGlobal = [];
    let indiceActual = 0;

    function cargarExcel() {
        const fInicio = document.getElementById('fechaInicio').value;
        const fFin = document.getElementById('fechaFin').value;
        const turnoSeleccionado = document.getElementById('filtroTurno').value;

        if (!fInicio || !fFin) {
            alert("Por favor, selecciona un rango de fechas.");
            return;
        }

        Papa.parse(URL_CSV, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                // Filtrado por Fecha y Turno
                pacientesGlobal = res.data.filter(p => {
                    if (!p['FECHA DE CITA'] || !p.CELULAR || !p.TURNO) return false;
                    
                    // Lógica de Fecha
                    const partes = p['FECHA DE CITA'].split('/');
                    const fechaPaciente = new Date(partes[2], partes[1] - 1, partes[0]);
                    const dInicio = new Date(fInicio + "T00:00:00");
                    const dFin = new Date(fFin + "T23:59:59");

                    const cumpleFecha = fechaPaciente >= dInicio && fechaPaciente <= dFin;
                    
                    // Lógica de Turno
                    const cumpleTurno = (turnoSeleccionado === "TODOS") || 
                                        (p.TURNO.trim().toLowerCase() === turnoSeleccionado.toLowerCase());

                    return cumpleFecha && cumpleTurno;
                });

                indiceActual = 0;
                mostrarLista();
                prepararSiguiente();
            }
        });
    }

    function mostrarLista() {
        const div = document.getElementById('lista');
        div.innerHTML = `<p style="text-align:center; color:#666;">Pacientes encontrados: ${pacientesGlobal.length}</p>`;
        
        const hoy = new Date();
        const hoyStr = `${hoy.getDate().toString().padStart(2, '0')}/${(hoy.getMonth() + 1).toString().padStart(2, '0')}/${hoy.getFullYear()}`;

        pacientesGlobal.forEach((p, i) => {
            const esHoy = (p['FECHA DE CITA'].trim() === hoyStr);
            const item = document.createElement('div');
            item.className = 'tarjeta';
            item.id = `paciente-${i}`;
            item.innerHTML = `
                <div class="info">
                    <b>${p.NOMBRE}</b>
                    <span>📅 ${p['FECHA DE CITA']} | ⏰ ${p.TURNO}</span>
                    <span style="font-size:10px; color:var(--dark)">📍 ${p.CONSULTORIO}</span>
                    ${esHoy ? '<br><span class="hoy-badge">CITA PARA HOY</span>' : ''}
                </div>
                <a href="#" class="btn-send" onclick="enviarIndividual(${i})">ENVIAR</a>
            `;
            div.appendChild(item);
        });
    }

    function prepararSiguiente() {
        if (indiceActual < pacientesGlobal.length) {
            const p = pacientesGlobal[indiceActual];
            const btn = document.getElementById('btnSiguiente');
            btn.href = generarLink(p);
            btn.style.display = 'block';
            btn.innerText = `SIGUIENTE: ${p.NOMBRE} (${p.TURNO})`;
        } else {
            document.getElementById('btnSiguiente').style.display = 'none';
        }
    }

    function generarLink(p) {
        const hoy = new Date();
        const hoyStr = `${hoy.getDate().toString().padStart(2, '0')}/${(hoy.getMonth() + 1).toString().padStart(2, '0')}/${hoy.getFullYear()}`;
        const esHoy = (p['FECHA DE CITA'].trim() === hoyStr);
        const fechaTxt = esHoy ? "*HOY*" : `el *${p['FECHA DE CITA']}*`;

        const msg = `Hola, le saludamos de su centro de salud. *${p.NOMBRE}*, se le recuerda que la cita de su control de su bebe es ${fechaTxt} en el turno *${p.TURNO}* en el *${p.CONSULTORIO}*. Por favor, no falte.`;
        return `https://api.whatsapp.com/send?phone=51${p.CELULAR.trim()}&text=${encodeURIComponent(msg)}`;
    }

    function enviarIndividual(i) {
        const p = pacientesGlobal[i];
        window.open(generarLink(p), '_blank');
        marcarComoEnviado(i);
    }

    function marcarSiguiente() {
        marcarComoEnviado(indiceActual);
        indiceActual++;
        setTimeout(prepararSiguiente, 1000);
    }

    function marcarComoEnviado(i) {
        const tarjeta = document.getElementById(`paciente-${i}`);
        if(tarjeta) {
            tarjeta.style.background = "#f0f0f0";
            tarjeta.style.opacity = "0.6";
            const btn = tarjeta.querySelector('.btn-send');
            btn.innerText = "ENVIADO";
            btn.style.background = "#aaa";
        }
    }
</script>

</body>
</html>
