<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIR | Registro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        #seccion-admin { display: none !important; } /* PROTECCIÓN DE ACCESO */
        :root { --blue: #38bdf8; --purple: #c084fc; --bg: #030712; }
        body { font-family: sans-serif; background: var(--bg); color: #f3f4f6; padding: 15px; }
        .admin-box { background: rgba(56,189,248,0.1); border: 2px dashed var(--blue); padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .form-card { background: rgba(15,23,42,0.8); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { text-align: center; background: linear-gradient(to right, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }
        input[type="text"], input[type="file"] { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; width: 90%; }
        .grid-cats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .cat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; }
        .hab-item { display: block; background: rgba(0,0,0,0.3); padding: 8px; margin: 5px 0; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: #fff; }
        .btn-reg { background: linear-gradient(var(--blue), var(--purple)); }
        .btn-xlsx { background: #10b981; }
    </style>
</head>
<body>
    <h1>SERVIR <span onclick="abrirAdmin()" style="cursor:pointer">🚀</span></h1>
    
    <div id="seccion-admin" class="admin-box">
        <h3>🔐 Admin Mode</h3>
        <input type="file" id="upload" accept=".xlsx"><br>
        <button onclick="exportar()" class="btn btn-xlsx">GENERAR REPORTE LIMPIO 📊</button>
    </div>

    <form action="https://formspree.io/f/TU_ID_AQUÍ" method="POST" class="form-card">
        <div class="input-grid">
            <input type="text" name="Nombre" placeholder="Nombre completo" required>
            <input type="text" name="DNI" placeholder="DNI" maxlength="8" required>
            <input type="text" name="WhatsApp" placeholder="WhatsApp" maxlength="9" required>
        </div>
        <p style="text-align:center; color:var(--purple); font-size:0.8rem">MÁXIMO 2 POR CATEGORÍA</p>
        <div class="grid-cats">
            <div class="cat-box"><h4>🥗 SALUD</h4>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="Nutrición"> Nutrición</label>
                <label class="hab-item"><input type="checkbox" name="Salud[]" value="PersonalSalud"> Personal Salud</label>
            </div>
            <div class="cat-box"><h4>📖 ENSEÑANZA</h4>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Biblia"> Biblia</label>
                <label class="hab-item"><input type="checkbox" name="Enseñanza[]" value="Maestro"> Maestro</label>
            </div>
        </div>
        <button type="submit" class="btn btn-reg">REGISTRAR TALENTOS ⚡</button>
    </form>

    <script>
        function abrirAdmin() {
            if(prompt("Clave:") === "admin2026") { 
                document.getElementById('seccion-admin').style.setProperty('display','block','important'); 
            }
        }
        // Lógica de máximo 2
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', () => {
                let name = cb.getAttribute('name');
                if(document.querySelectorAll(`input[name="${name}"]:checked`).length > 2) {
                    cb.checked = false; alert("Máximo 2");
                }
            });
        });
        function exportar() { alert("Reporte listo para procesar."); }
    </script>
</body>
</html>
