<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envío Masivo CRED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --dark: #075E54; --wa: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { max-width: 550px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--dark); text-align: center; margin-bottom: 20px; }
        .btn-main { background: var(--dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-next { background: #ff9800; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: none; text-align: center; text-decoration: none; }
        .tarjeta { border: 1px solid #eee; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .info b { display: block; text-transform: uppercase; font-size: 13px; }
        .info span { font-size: 12px; color: #666; }
        .btn-send { background: var(--wa); color: white; text-decoration: none; padding: 8px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-sent { opacity: 0.5; background: #ccc !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>Control de Salud CRED</h2>
    <button class="btn-main" onclick="cargarExcel()">1. CARGAR LISTA COMPLETA</button>
    
    <a id="btnSiguiente" href="#" target="_blank" class="btn-next" onclick="marcarSiguiente()">2. ENVIAR AL SIGUIENTE PACIENTE</a>

    <div id="lista"></div>
</div>

<script>
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-kCdER9NTPl29MALvc5Bam5N-UniBAH-OqP5GusOdT9wbJyQ5XQs-Qt66L6ds9ZxW1sUtZ9L7z4pW/pub?gid=0&single=true&output=csv'; // <--- PEGA TU LINK AQUÍ
    let pacientesGlobal = [];
    let indiceActual = 0;

    function cargarExcel() {
        Papa.parse(URL_CSV, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                pacientesGlobal = res.data.filter(p => p.NOMBRE && p.CELULAR);
                mostrarLista();
                prepararSiguiente();
            }
        });
    }

    function mostrarLista() {
        const div = document.getElementById('lista');
        div.innerHTML = `<p style="text-align:center">Total: ${pacientesGlobal.length} pacientes encontrados</p>`;
        
        pacientesGlobal.forEach((p, i) => {
            const msg = `Hola, le saludamos de su centro de salud. *${p.NOMBRE}*, se le recuerda que la cita de su control de su bebe será el *${p['FECHA DE CITA']}*. Por favor, no falte.`;
            const link = `https://api.whatsapp.com/send?phone=51${p.CELULAR.trim()}&text=${encodeURIComponent(msg)}`;
            
            const item = document.createElement('div');
            item.className = 'tarjeta';
            item.id = `paciente-${i}`;
            item.innerHTML = `
                <div class="info">
                    <b>${p.NOMBRE}</b>
                    <span>Cita: ${p['FECHA DE CITA']}</span>
                </div>
                <a href="${link}" target="_blank" class="btn-send" onclick="marcarComoEnviado(${i})">ENVIAR</a>
            `;
            div.appendChild(item);
        });
    }

    function prepararSiguiente() {
        if (indiceActual < pacientesGlobal.length) {
            const p = pacientesGlobal[indiceActual];
            const msg = `Hola, le saludamos de su centro de salud. *${p.NOMBRE}*, se le recuerda que la cita de su control de su bebe será el *${p['FECHA DE CITA']}*. No falte.`;
            const link = `https://api.whatsapp.com/send?phone=51${p.CELULAR.trim()}&text=${encodeURIComponent(msg)}`;
            
            const btn = document.getElementById('btnSiguiente');
            btn.href = link;
            btn.style.display = 'block';
            btn.innerText = `ENVIAR A: ${p.NOMBRE}`;
        } else {
            document.getElementById('btnSiguiente').style.display = 'none';
            alert("¡Terminaste con toda la lista!");
        }
    }

    function marcarSiguiente() {
        marcarComoEnviado(indiceActual);
        indiceActual++;
        // Esperamos un segundo antes de preparar el siguiente para que cargue el link
        setTimeout(prepararSiguiente, 1000);
    }

    function marcarComoEnviado(i) {
        const tarjeta = document.getElementById(`paciente-${i}`);
        if(tarjeta) {
            tarjeta.style.background = "#e8f5e9";
            tarjeta.querySelector('.btn-send').classList.add('status-sent');
            tarjeta.querySelector('.btn-send').innerText = "ENVIADO";
        }
    }
</script>

</body>
</html>
